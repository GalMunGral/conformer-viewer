<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ensemble viewer</title>
    <style>
      body { margin: 0; }
      #menu {
        position: fixed;
        top: 20px;
        left: 20px;
        font-family: sans-serif;
        font-size: 14px;
        color: white;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #menu label {
        opacity: 0.9;
        font-weight: bold;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      #menu select {
        background: rgba(0,0,0,0.7);
        color: white;
        border: 1px solid rgba(255,255,255,0.5);
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        width: 160px;
      }
      #menu .hint {
        opacity: 0.5;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <label>Ensemble</label>
      <select>
        <option value="gbca.gltf">GBCA</option>
        <option value="bpa.gltf">BPA</option>
      </select>
      <span class="hint">Space — toggle exploded view</span>
    </div>
    <script type="module" src="/index.ts"></script>
  </body>
</html>
